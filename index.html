        // 核心控制器：控制畫面的更換與平滑渲染
        function renderScene(sceneId) {
            const data = storyData[sceneId];
            if (!data) return;

            // 更新狀態與計步
            document.getElementById('game-status').innerText = `目前地點：${data.status}`;
            
            // 更換場景大圖
            const imgElement = document.getElementById('scene-img');
            imgElement.style.opacity = 0; // 先隱藏，做淡出效果
            
            setTimeout(() => {
                imgElement.src = data.img;
                imgElement.style.opacity = 1; // 換好圖後淡入
            }, 200);

            // 更換故事內容
            document.getElementById('story-text').innerHTML = data.text;

            // 清空並重新生成選項按鈕
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = "";
            
            data.choices.forEach(choice => {
                const button = document.createElement('button');
                button.className = "btn";
                button.innerHTML = choice.text;
                button.onclick = () => renderScene(choice.target);
                optionsBox.appendChild(button);
            });
        }

        // 網頁載入時自動初始化第一幕
        window.onload = function() {
            renderScene("start");
        };
    </script>
